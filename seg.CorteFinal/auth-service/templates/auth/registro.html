<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">
<div class="card p-4 mx-auto" style="width: 350px;">
    <h3 class="text-center">Registro</h3>

    <input id="nombre" class="form-control mt-2" placeholder="Nombre">
    <input id="email" class="form-control mt-2" placeholder="Correo">
    <input id="password" type="password" class="form-control mt-2" placeholder="Contraseña">
    <input id="confirm" type="password" class="form-control mt-2" placeholder="Confirmar contraseña">

    <button onclick="registro()" class="btn btn-success w-100 mt-3">Crear cuenta</button>
    <div id="form-msg" class="alert d-none mt-3 mb-0" role="alert"></div>

    <a href="/" class="text-center mt-2">Volver</a>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
