<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pizzería</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍕 Dart Pizza</span>

    <div>
        {% if session.get("rol") == "admin" %}
        <a href="/inventario" class="btn btn-outline-light">Inventario</a>
        <a href="/admin" class="btn btn-outline-light">Pedidos</a>
        <a href="/perfil" class="btn btn-outline-light">Perfil</a>
        {% elif session.get("rol") == "cliente" %}
        <a href="/cliente" class="btn btn-outline-light">Productos</a>
        <a href="/mis-pedidos" class="btn btn-outline-light">Pedidos</a>
        <a href="/perfil" class="btn btn-outline-light">Perfil</a>
        {% endif %}
        <a href="/logout" class="btn btn-danger">Salir</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
