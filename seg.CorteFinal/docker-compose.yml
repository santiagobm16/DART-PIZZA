version: "3.9"

services:

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  auth:
    build: ./auth-service
    container_name: auth_service
    restart: always
    ports:
      - "5001:5000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  inventario:
    build: ./inventario
    container_name: inventario_service
    restart: always
    ports:
      - "5002:5000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  pedidos:
    build: ./pedidos
    container_name: pedidos_service
    restart: always
    ports:
      - "5003:5000"
    env_file:
      - .env
    depends_on:
      - db
      - auth
      - inventario
    networks:
      - app-network

  gateway:
    build: ./gateway
    container_name: gateway_service
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - auth
      - inventario
      - pedidos
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network: