services:
  backend:
    build: ./backend
    ports:
      - "5002:5000"
    depends_on:
      - db
    env_file:
      - .env
  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
  usuarios:
    build: ./usuarios
    ports:
      - "5001:5000"
  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - backend
      - usuarios
volumes:
  db_data: 